<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edible Pippidon - Rhythm Game</title>
    <link href="./static/index.css" rel="stylesheet" type="text/css">
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body onLoad="init()" oncontextmenu="return false;">

<div id="GameScoreLayer" class="BBOX SHADE bgc1" style="display:none;">
    <div style="padding:5%;margin-top: 200px;background-color: rgba(125, 181, 216, 0.3);">
        <div id="GameScoreLayer-text" style="font-size: 1.5em; margin-bottom: 20px;"></div>
        <div id="GameScoreLayer-CPS" class="mb-2 d-flex flex-row justify-content-center text-start">
            <div class="col-3">CPS</div>
            <div class="col-2" id="cps"></div>
        </div>
        <div id="GameScoreLayer-score" class="mb-2 d-flex flex-row justify-content-center text-start">
            <div class="col-3">Score</div>
            <div class="col-2" id="score"></div>
        </div>
        <div id="GameScoreLayer-best" class="mb-2 d-flex flex-row justify-content-center text-start">
            <div class="col-3">Best</div>
            <div class="col-2" id="best"></div>
        </div>
        <button type="button" class="btn btn-primary btn-lg" id="replay" onclick="replayBtn()">Play Again</button>
        <button type="button" class="btn btn-secondary btn-lg" onclick="backBtn()">Menu</button>
    </div>
</div>

<div id="welcome" class="SHADE BOX-M">
    <div class="welcome-bg FILL"></div>
    <div class="FILL BOX-M" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:5;">
        <div class="container">
            <div class="container mb-5">
                <div style="font-size:2.6em; color:#FEF002; font-weight: bold;">Edible Pippidon</div>
                <div style="font-size: 1em; color: #fff; margin-top: 10px;">A Rhythm Clicking Game</div>
                <br />
                <div id="desc" style="display: block;font-size:1.5em; color:#fff; line-height:1.5em;">
                    <p>Click the tiles in the correct sequence!</p>
                    <p>Test your reflexes and achieve the highest score.</p>
                </div>
            </div>
            <div id="btn_group" class="container text-nowrap">
                <div class="d-flex justify-content-center flex-column flex-fill">
                    <a class="btn btn-primary btn-lg mb-3" onclick="readyBtn()">Start Game</a>
                    <div class="dropdown mb-3">
                        <a class="w-100 btn btn-secondary btn-lg" href="javascript: void(0);" role="button" id="mode" data-bs-toggle="dropdown" aria-expanded="false">Game Mode</a>
                        <ul class="dropdown-menu" aria-labelledby="mode">
                            <li><a class="dropdown-item" onclick="changeMode(MODE_NORMAL)">Normal (20s)</a></li>
                            <li><a class="dropdown-item" onclick="changeMode(MODE_ENDLESS)">Endless</a></li>
                            <li><a class="dropdown-item" onclick="changeMode(MODE_PRACTICE)">Practice</a></li>
                        </ul>
                    </div>
                    <a class="btn btn-secondary btn-lg" onclick="show_setting()">Settings</a>
                </div>
            </div>
            <div id="setting" class="container" style="display: none;">
                <div class="container mb-3 btn-group">
                    <a type="button" class="btn text-nowrap btn-secondary me-1" onclick="getClickBeforeImage()">Upload Tile Image</a>
                    <input type="file" id="click-before-image" accept="image/*" class="d-none" onchange="saveClickBeforeImage()">
                    <a type="button" class="btn text-nowrap btn-secondary me-1" onclick="getClickAfterImage()">Upload Click Image</a>
                    <input type="file" id="click-after-image" accept="image/*" style="display: none;" onchange="saveClickAfterImage()">
                    <a id="sound" type="button" class="btn text-nowrap btn-secondary" onclick="changeSoundMode()"></a>
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend col-2">
                        <span class="input-group-text">Title</span>
                    </div>
                    <input type="text" id="title" class="form-control" placeholder="Game Title">
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend col-2">
                        <span class="input-group-text">Keys</span>
                    </div>
                    <input type="text" id="keyboard" class="form-control" maxlength="4" placeholder="dfjk">
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend col-2">
                        <span class="input-group-text">Time (s)</span>
                    </div>
                    <input type="text" id="gameTime" class="form-control" maxlength="4" placeholder="20">
                </div>
                <button type="button" class="btn btn-secondary btn-lg" onclick="show_btn();save_cookie();">OK</button>
            </div>
        </div>
    </div>
</div>

<script src="./static/index.js"></script>
</body>
</html>
